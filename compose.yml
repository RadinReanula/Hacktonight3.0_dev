# use with docker compose up --build --watch

services:
  htn26-challenge-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: htn-26-challenge-dev-container
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

  db:
    image: postgres:17-alpine
    container_name: htn-26-challenge-db
    env_file:
      - .env.local
    # No host port mapping — the app reaches Postgres at db:5432 on the internal
    # Docker network. Exposing 5432/5433 on Windows often fails due to reserved
    # port ranges; omit this unless you explicitly need host access.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
